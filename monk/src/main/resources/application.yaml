quarkus:
  http:
    port: 8080
  # Quinoa serves the React SPA in src/main/webui: built into the app at package time
  # and run via the Vite dev server (live reload) during quarkusDev. Same-origin on :8080.
  quinoa:
    ui-dir: src/main/webui
    build-dir: dist
    enable-spa-routing: true
    # Let Quarkus REST handle the API: without this, Quinoa's SPA routing forwards
    # /queries/* to the dev server (which, via the Vite dev proxy, loops back and hangs).
    ignored-path-prefixes: /queries
  swagger-ui:
    always-include: true
    theme: "flattop"
    deep-linking: true
    display-request-duration: true
    default-models-expand-depth: 1
    try-it-out-enabled: true
    urls-primary-name: "monk API v1"
  smallrye-openapi:
    info-title: "Monk"
    info-version: "1.0.0"
    info-description: >
      Translate and execute search queries using the **Monk DSL** across
      Elasticsearch and Solr backends.

      Submit a search request with material types and a query tree;
      monk routes to the right backends, translates the DSL into
      engine-native syntax, and merges results with normalized scores.
    info-license-name: "Apache 2.0"
    info-license-url: "https://www.apache.org/licenses/LICENSE-2.0"
  # Container image built with Quarkus Jib (no Dockerfile / Docker daemon needed at build assembly).
  container-image:
    group: monk
    name: monk
    tag: latest
  jib:
    # The app is compiled to Java 25 bytecode, so the runtime base image must ship a Java 25 JRE
    # (Quarkus' default UBI base image is Java 21).
    base-jvm-image: eclipse-temurin:25-jre
  dev-ui:
    allow-extension-management: false

indexer:
  catalog:
    source: FILE
    file:
      backends: "./config/backends.json"
      config: "./config/catalog.json"
      datasources: "./config/datasources.json"

monk:
  vapi:
    endpointName: "https://example.endpoint.com/capsules/fetch"
  embedding:
    url: "https://example.embedding.com/embed"
